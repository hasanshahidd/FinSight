server {
    listen 5173;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — every route serves index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
